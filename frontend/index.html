<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Ativos de TI</title>
    <!-- Aplica o tema salvo antes do React montar, evitando "flash" de tela clara. -->
    <script>
      document.documentElement.dataset.theme =
        localStorage.getItem("theme") || "light";
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
